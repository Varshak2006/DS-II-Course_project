<!DOCTYPE html>
<html>
<head>
    <title>College Timetable System</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<h1> College Timetable Scheduling System</h1>

<div class="controls">
    <select id="classSelect">
        <option value="FE-A">FE-A</option>
        <option value="FE-B">FE-B</option>
        <option value="FE-C">FE-C</option>
        <option value="FE-D">FE-D</option>
        <option value="FE-E">FE-E</option>
        <option value="SE-A">SE-A</option>
        <option value="SE-B">SE-B</option>
        <option value="SE-C">SE-C</option>
        <option value="SE-D">SE-D</option>
        <option value="SE-E">SE-E</option>
    </select>

    <button onclick="addSubject()">Add Subject</button>
    <button onclick="generateTimetable()"> Generate</button>
</div>

<div id="subjectForm" class="formBox">
    <input type="text" id="subName" placeholder="Subject Name">

    <select id="subType">
        <option value="Theory">Theory</option>
        <option value="Lab">Lab</option>
    </select>

    <input type="number" id="frequency" placeholder="Frequency">
    <input type="number" id="priority" placeholder="Priority (1-10)">
    <input type="text" id="faculty" placeholder="Faculty Name">

    <label>Available Days:</label><br>
    <input type="checkbox" value="Monday">Mon
    <input type="checkbox" value="Tuesday">Tue
    <input type="checkbox" value="Wednesday">Wed
    <input type="checkbox" value="Thursday">Thu
    <input type="checkbox" value="Friday">Fri
    <br><br>

    <button onclick="saveSubject()"> Save</button>
</div>

<h2 id="timetableTitle"></h2>
<div id="timetableContainer"></div>

<script src="script.js"></script>
</body>
</html>
